port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
unified-delay: true
# No public IPv6 on most residential/DC VPS exits — disabling IPv6 here stops
# the client handing unreachable IPv6 targets to the node (stalls, timeouts).
ipv6: false

proxies:
  - name: Example-Resi-01
    type: vless
    server: 203.0.113.10
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    network: tcp
    udp: true
    tfo: true
    tls: true
    flow: xtls-rprx-vision
    servername: addons.mozilla.org
    client-fingerprint: chrome
    reality-opts:
      public-key: BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
      short-id: ""

proxy-groups:
  - name: PROXY
    type: url-test
    proxies:
      - Example-Resi-01
    url: https://api.openai.com/v1/models
    expected-status: 401
    interval: 300
    lazy: false

  - name: GLOBAL
    type: select
    proxies:
      - PROXY

rules:
  # ── Ad / tracker blocking ────────────────────────────────────────────
  - GEOSITE,category-ads-all,REJECT

  # ── Explicit China safety net ────────────────────────────────────────
  # GEOSITE,CN below is a community-maintained blob: broad, but it lags and
  # silently degrades when the geodata file fails to load. These high-traffic
  # suffixes are listed first so the common domestic services stay DIRECT even
  # then. DOMAIN-SUFFIX is suffix matching — subdomains are covered.
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,wechat.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - DOMAIN-SUFFIX,alipay.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,tmall.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,alicdn.com,DIRECT
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,bdstatic.com,DIRECT
  - DOMAIN-SUFFIX,jd.com,DIRECT
  - DOMAIN-SUFFIX,douyin.com,DIRECT
  - DOMAIN-SUFFIX,bilibili.com,DIRECT
  - DOMAIN-SUFFIX,163.com,DIRECT
  - DOMAIN-SUFFIX,weibo.com,DIRECT
  - DOMAIN-SUFFIX,zhihu.com,DIRECT
  - DOMAIN-SUFFIX,meituan.com,DIRECT
  - DOMAIN-SUFFIX,xiaohongshu.com,DIRECT
  - DOMAIN-SUFFIX,gov.cn,DIRECT
  - DOMAIN-SUFFIX,edu.cn,DIRECT
  - DOMAIN-SUFFIX,com.cn,DIRECT

  # ── Community geodata, then everything else through the node ─────────
  - GEOSITE,CN,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,PROXY
